# ArenaQA 免费模型 Docker Compose
# 使用 LLM-Red-Team 的免费 API Docker 镜像
# 仅供学习研究，请勿用于商业用途
#
# 使用前:
# 1. 复制 .env.example 为 .env
# 2. 填入各平台的 Cookie Token
# 3. docker compose -f docker-compose.free.yml up -d

services:
  # ====== Kimi (月之暗面) ======
  kimi-free-api:
    image: vinlic/kimi-free-api:latest
    container_name: arenaqa-kimi-free
    ports:
      - "8001:8000"
    environment:
      - TZ=Asia/Shanghai
      - TOKEN=${FREE_KIMI_FREE_TOKEN}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

